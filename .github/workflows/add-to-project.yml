name: Auto-add issues to project
on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v2.0.0
        with:
          project-url: https://github.com/users/RobinEste/projects/1
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
